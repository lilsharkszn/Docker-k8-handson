services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://root:example@mongodb:27017/?authSource=admin
    depends_on:
      - mongodb

volumes:
  mongo-data:

services:
  mongodb:
    volumes:
      - mongo-data:/data/db
